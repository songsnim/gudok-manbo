name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify signing secrets present
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          miss=0
          for v in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD API_BASE_URL; do
            if [ -z "${!v}" ]; then echo "::error::secret $v is EMPTY or missing"; miss=1; else echo "$v: set"; fi
          done
          exit $miss

      - name: Decode and validate keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
          ls -l "$RUNNER_TEMP/release.jks"
          if keytool -list -keystore "$RUNNER_TEMP/release.jks" \
               -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -alias "${{ secrets.KEY_ALIAS }}" >/dev/null 2>&1; then
            echo "keystore + password + alias OK"
          else
            echo "::error::keystore invalid OR KEYSTORE_PASSWORD/KEY_ALIAS wrong"
            exit 1
          fi

      - name: Build signed release APK
        working-directory: android
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: v1.0.${{ github.run_number }}
          files: android/app/build/outputs/apk/release/app-release.apk
